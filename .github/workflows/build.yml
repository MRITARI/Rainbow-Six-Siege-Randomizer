name: Build Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject API Key into Form1.cs
      env:
        API_KEY: ${{ secrets.R6_API_KEY }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      shell: pwsh
      run: |
        $path = "r6random/Form1.cs"
        $content = Get-Content -Path $path -Raw
        
        
        if ($content -notmatch "YOUR_GITHUB_SECRET_HERE") {
            Write-Error "CRITICAL ERROR: Could not find 'YOUR_GITHUB_SECRET_HERE' in Form1.cs! Did you push the placeholder to GitHub?"
            exit 1
        }
        
        
        $content = $content.Replace("YOUR_GITHUB_SECRET_HERE", $env:API_KEY)
        Set-Content -Path $path -Value $content -Encoding UTF8
        
        
        $check = Get-Content -Path $path -Raw
        if ($check -match "YOUR_GITHUB_SECRET_HERE") {
            Write-Error "CRITICAL ERROR: Replacement failed to save!"
            exit 1
        }
        
        Write-Host "Success: Key was perfectly injected into Form1.cs!"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet Packages
      run: nuget restore r6random.sln

    - name: Build the App
      run: msbuild r6random.sln /p:Configuration=Release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        path: |
          r6random/bin/Release/
          !r6random/bin/Release/*.xml
          !r6random/bin/Release/*.pdb

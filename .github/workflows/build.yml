name: Build Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Inject API Key into Form1.cs
      env:
        API_KEY: ${{ secrets.R6_API_KEY }}
      shell: pwsh
      run: |
        if ([string]::IsNullOrWhiteSpace($env:API_KEY)) {
            Write-Error "The API key from GitHub Secrets is empty! GitHub is not passing it."
            exit 1
        }
        Write-Host "Success: API Key loaded from secrets. Length: $($env:API_KEY.Length)"
        
        $path = "r6random/Form1.cs"
        $content = Get-Content -Path $path -Raw
        $content = $content.Replace("YOUR_GITHUB_SECRET_HERE", $env:API_KEY)
        Set-Content -Path $path -Value $content -Encoding UTF8

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet Packages
      run: nuget restore r6random.sln

    - name: Build the App
      run: msbuild r6random.sln /p:Configuration=Release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: R6-Randomizer-Release
        path: r6random/bin/Release/
